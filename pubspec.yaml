name: gait_detector
description: GaitDetector - Flutter步态检测应用，支持BLE蓝牙传感器、数据录制和CSV导出。

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_blue_plus: ^1.18.0
  permission_handler: ^11.0.0
  provider: ^6.0.5
  path_provider: ^2.1.1
  share_plus: ^7.2.2
  intl: ^0.19.0
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
