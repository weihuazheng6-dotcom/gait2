name: Build APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'

      - run: rm -rf android/ && flutter clean

      - run: flutter create --platforms android .

      - name: Fix build.gradle with sed
        run: |
          # Add compileSdkVersion if missing
          sed -i '/^android {/a\    compileSdkVersion = 34' android/app/build.gradle
          
          # Add ndkVersion if missing
          sed -i '/compileSdkVersion/a\    ndkVersion = "25.1.8937393"' android/app/build.gradle
          
          # Display the result
          cat android/app/build.gradle | head -30

      - run: flutter pub get

      - run: flutter build apk --debug --verbose

      - uses: actions/upload-artifact@v4
        with:
          name: gait-detector-apk
          path: build/app/outputs/apk/debug/app-debug.apk
          if-no-files-found: warn
          retention-days: 30
