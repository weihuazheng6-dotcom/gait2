name: Build APK

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'

      - run: flutter clean && rm -rf android/

      - run: |
          mkdir -p temp_project
          cd temp_project
          flutter create --platforms android test_app
          cd ..
          rm -rf android/
          cp -r temp_project/test_app/android ./
          rm -rf temp_project

      - run: |
          sed -i 's/compileSdkVersion flutter.compileSdkVersion/compileSdkVersion 34/g' android/app/build.gradle
          sed -i 's/targetSdkVersion flutter.targetSdkVersion/targetSdkVersion 34/g' android/app/build.gradle

      - run: flutter pub get

      - run: flutter build apk --debug

      - uses: actions/upload-artifact@v4
        with:
          name: gait-detector-apk
          path: build/app/outputs/apk/debug/app-debug.apk
