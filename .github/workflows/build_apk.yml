name: Build APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'

      - name: Create Flutter Android project
        run: |
          mkdir -p android_base
          cd android_base
          flutter create --platforms android temp_app
          cd ..
          cp -r android_base/temp_app/android ./android
          rm -rf android_base

      - run: flutter pub get

      - run: flutter build apk --debug

      - uses: actions/upload-artifact@v4
        with:
          name: gait-detector-debug
          path: build/app/outputs/apk/debug/app-debug.apk
          retention-days: 30
